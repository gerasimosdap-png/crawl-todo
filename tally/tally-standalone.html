<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Tally</title>
  <meta name="description" content="A calm personal task tracker — daily tasks, weekly goals, and clear charts. Monday to Sunday." />
  <meta name="theme-color" content="#7a8a7c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tally" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <style>
/* ============================================================
   Tally — calm pastel task tracker
   ============================================================ */

/* ---- Theme palettes (pastel / neutral) ---- */
:root,
[data-theme="sage"] {
  --bg: #f3f5f0;
  --surface: #ffffff;
  --surface-2: #eef1ea;
  --text: #2f352f;
  --muted: #7c857b;
  --line: #e3e7df;
  --accent: #8aa088;
  --accent-soft: #dfe8dc;
  --accent-ink: #46553f;
  --ring-track: #e7ebe3;
}
[data-theme="sand"] {
  --bg: #f6f1e9;
  --surface: #fffdf9;
  --surface-2: #f0e9dc;
  --text: #3a342b;
  --muted: #8a8170;
  --line: #e8ddca;
  --accent: #c9a978;
  --accent-soft: #efe3cd;
  --accent-ink: #6f5a36;
  --ring-track: #ece3d2;
}
[data-theme="sky"] {
  --bg: #eef3f6;
  --surface: #ffffff;
  --surface-2: #e6edf2;
  --text: #2b333a;
  --muted: #76828c;
  --line: #dde6ec;
  --accent: #8bb0c9;
  --accent-soft: #dce9f1;
  --accent-ink: #3d5a6e;
  --ring-track: #e2eaf0;
}
[data-theme="blush"] {
  --bg: #f8f0f1;
  --surface: #fffafb;
  --surface-2: #f2e6e8;
  --text: #3a2f31;
  --muted: #8c787c;
  --line: #ecdadd;
  --accent: #d3a1aa;
  --accent-soft: #f0dde1;
  --accent-ink: #774953;
  --ring-track: #efe0e3;
}
[data-theme="lavender"] {
  --bg: #f3f1f7;
  --surface: #fffdff;
  --surface-2: #ebe7f1;
  --text: #322f3a;
  --muted: #807a8c;
  --line: #e3deec;
  --accent: #a99bc9;
  --accent-soft: #e5dff0;
  --accent-ink: #534873;
  --ring-track: #e6e1ee;
}
[data-theme="slate"] {
  --bg: #eef0f1;
  --surface: #ffffff;
  --surface-2: #e6e9eb;
  --text: #2f3336;
  --muted: #798084;
  --line: #dde1e3;
  --accent: #94a2a8;
  --accent-soft: #dfe5e7;
  --accent-ink: #455055;
  --ring-track: #e3e7e9;
}
[data-theme="charcoal"] {
  --bg: #20232a;
  --surface: #2a2e37;
  --surface-2: #313641;
  --text: #e7e9ee;
  --muted: #9aa1ad;
  --line: #3a3f4b;
  --accent: #9db8a6;
  --accent-soft: #34433a;
  --accent-ink: #cfe2d5;
  --ring-track: #3a3f4b;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
[hidden] { display: none !important; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  transition: background .3s ease, color .3s ease;
}

#app {
  max-width: 540px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 0 16px calc(96px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
}

/* ---- Header ---- */
#top { padding: calc(18px + env(safe-area-inset-top)) 2px 8px; }
.top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.greet { font-size: 1.45rem; font-weight: 700; letter-spacing: -.02em; }
.subgreet { font-size: .82rem; color: var(--muted); margin-top: 2px; }

.week-dots { display: flex; gap: 6px; padding-top: 6px; }
.wd { width: 28px; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: 0; padding: 2px 0; cursor: pointer; font: inherit; color: inherit; border-radius: 10px; }
.wd:active { transform: scale(.94); }
.wd-lbl { font-size: .6rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.wd-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--surface-2); border: 1.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
}
.wd-dot.has { background: var(--accent-soft); border-color: var(--accent); }
.wd-dot.full { background: var(--accent); border-color: var(--accent); }
.wd-dot.today { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--accent); }
.wd-dot.sel { transform: scale(1.18); border-color: var(--accent-ink); }
.wd:hover .wd-dot { border-color: var(--accent); }
.wd-dot svg { color: var(--accent-ink); }

/* selected-day banner */
.day-banner { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--accent-soft); color: var(--accent-ink); border-radius: 12px; padding: 9px 14px; margin: 6px 0 12px; font-size: .86rem; font-weight: 600; }
.daylink { background: none; border: 0; color: var(--accent-ink); font-weight: 700; font-size: .82rem; cursor: pointer; text-decoration: underline; }
.card.future { opacity: .62; }
.card.future .check { cursor: default; }

/* inline task emoji */
.ttl-ico { display: inline-block; margin-right: 7px; font-size: 1.05rem; line-height: 1; }

/* discreet info button */
.info-btn { flex: none; width: 32px; height: 32px; border-radius: 50%; border: 0; background: none; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: .5; transition: opacity .15s ease, color .15s ease; }
.info-btn:hover, .info-btn:active { opacity: 1; color: var(--accent-ink); }

/* suggestion popover */
.info-pop { position: fixed; inset: 0; z-index: 55; background: rgba(20,22,20,.34); display: flex; align-items: flex-end; justify-content: center; animation: fade .2s ease; }
.info-card { background: var(--bg); width: 100%; max-width: 540px; border-radius: 22px 22px 0 0; padding: 22px 20px calc(24px + env(safe-area-inset-bottom)); animation: slideup .26s cubic-bezier(.2,.8,.2,1); }
.info-head { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; }
.info-emoji { flex: none; width: 52px; height: 52px; border-radius: 16px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 1.7rem; }
.info-title { font-size: 1.1rem; font-weight: 700; }
.info-lead { font-size: .9rem; color: var(--accent-ink); margin-top: 2px; }
.info-points { margin: 0 0 18px; padding-left: 20px; }
.info-points li { font-size: .92rem; line-height: 1.55; color: var(--text); margin-bottom: 8px; }

/* ---- Views ---- */
#main { flex: 1; }
.view { animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.section-title {
  font-size: .76rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin: 18px 4px 8px;
}
.section-title:first-child { margin-top: 6px; }

/* ---- Task cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 13px;
  transition: transform .12s ease, box-shadow .2s ease, opacity .2s ease;
}
.card:active { transform: scale(.992); }

.check {
  flex: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--line);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #fff;
  transition: background .15s ease, border-color .15s ease, transform .15s ease;
}
.check svg { opacity: 0; transition: opacity .15s ease; }
.check.on { background: var(--accent); border-color: var(--accent); }
.check.on svg { opacity: 1; }
.check.count {
  font-size: .9rem; font-weight: 700; color: var(--accent-ink);
  background: var(--accent-soft); border-color: var(--accent-soft);
}

.card-body { flex: 1; min-width: 0; cursor: pointer; }
.card-title { font-size: 1rem; font-weight: 600; line-height: 1.25; }
.card.done .card-title { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--line); }
.card-meta { display: flex; gap: 8px; align-items: center; margin-top: 5px; flex-wrap: wrap; }
.tag {
  font-size: .68rem; font-weight: 600; color: var(--muted);
  background: var(--surface-2); border-radius: 999px; padding: 2px 8px;
}
.tag.accent { color: var(--accent-ink); background: var(--accent-soft); }

/* inline progress bar inside a card */
.miniprog { margin-top: 8px; height: 6px; border-radius: 999px; background: var(--ring-track); overflow: hidden; }
.miniprog > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s ease; }

/* ---- Empty state ---- */
.empty { text-align: center; padding: 44px 24px; color: var(--muted); }
.empty .big { font-size: 2.2rem; margin-bottom: 10px; }
.empty .lead { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.empty .sub { font-size: .86rem; line-height: 1.5; }

/* ---- Bottom nav ---- */
#nav {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-around;
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
  z-index: 30;
}
.navbtn {
  flex: 1; background: none; border: 0; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--muted); font-size: .66rem; font-weight: 600;
  padding: 4px; border-radius: 12px;
  transition: color .15s ease;
}
.navbtn.active { color: var(--accent-ink); }
.navbtn.active svg { color: var(--accent); }

/* ---- FAB ---- */
#fab {
  position: fixed; right: max(18px, calc(50% - 270px + 18px));
  bottom: calc(74px + env(safe-area-inset-bottom));
  width: 56px; height: 56px; border-radius: 18px;
  background: var(--accent); color: #fff; border: 0;
  box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 45%, transparent);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 31;
  transition: transform .15s ease;
}
#fab:active { transform: scale(.92); }

/* ---- Stats ---- */
.stat-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 18px; padding: 18px; margin-bottom: 12px;
}
.stat-card h3 { margin: 0 0 2px; font-size: .95rem; }
.stat-card .hint { font-size: .78rem; color: var(--muted); margin: 0 0 14px; }
.ring-wrap { display: flex; align-items: center; gap: 18px; }
.ring-fig { flex: none; }
.ring-read { font-size: 2rem; font-weight: 800; letter-spacing: -.02em; }
.ring-sub { font-size: .82rem; color: var(--muted); }
.bigrow { display: flex; gap: 10px; }
.bigrow .stat-card { flex: 1; text-align: center; }
.bignum { font-size: 1.8rem; font-weight: 800; letter-spacing: -.02em; }
.biglbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }

.bars { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; height: 120px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.bar { width: 70%; max-width: 26px; background: var(--accent); border-radius: 7px 7px 4px 4px; min-height: 4px; transition: height .4s ease; }
.bar.empty { background: var(--ring-track); }
.bar-lbl { font-size: .62rem; color: var(--muted); font-weight: 600; }
.bar-val { font-size: .62rem; color: var(--muted); }

.tprog { margin-bottom: 14px; }
.tprog:last-child { margin-bottom: 0; }
.tprog-top { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: 6px; }
.tprog-top .n { color: var(--muted); }
.tprog-bar { height: 8px; border-radius: 999px; background: var(--ring-track); overflow: hidden; }
.tprog-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width .4s ease; }

/* ---- Settings ---- */
.set-group { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; margin-bottom: 14px; overflow: hidden; }
.set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
.set-row:last-child { border-bottom: 0; }
.set-row .lbl { font-size: .92rem; font-weight: 600; }
.set-row .sub { font-size: .76rem; color: var(--muted); margin-top: 2px; }
.set-row .lblwrap { min-width: 0; }

.themes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 16px; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; border: 0; background: none; }
.swatch .dot { width: 38px; height: 38px; border-radius: 12px; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; }
.swatch.sel .dot { border-color: var(--accent-ink); box-shadow: 0 0 0 2px var(--surface), 0 0 0 3.5px var(--accent); }
.swatch .nm { font-size: .66rem; color: var(--muted); font-weight: 600; }
.swatch .dot svg { color: #fff; opacity: 0; }
.swatch.sel .dot svg { opacity: 1; }

/* toggle switch */
.switch { position: relative; width: 46px; height: 28px; flex: none; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; cursor: pointer; transition: background .2s ease; }
.slider::before { content: ""; position: absolute; width: 22px; height: 22px; left: 2px; top: 2px; background: #fff; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: transform .2s ease; }
.switch input:checked + .slider { background: var(--accent); border-color: var(--accent); }
.switch input:checked + .slider::before { transform: translateX(18px); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--accent); color: #fff; border: 0; border-radius: 12px;
  padding: 12px 16px; font-size: .9rem; font-weight: 700; cursor: pointer;
  transition: transform .12s ease, filter .15s ease;
}
.btn:active { transform: scale(.97); }
.btn.ghost { background: var(--surface-2); color: var(--text); }
.btn.block { display: flex; width: 100%; }
.btn.danger { background: none; color: #b4524f; border: 1px solid var(--line); }
.time-input, .text-input {
  background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
  border-radius: 10px; padding: 9px 11px; font-size: .9rem; font-family: inherit;
}
.about { font-size: .8rem; color: var(--muted); line-height: 1.55; padding: 4px 4px 0; }

/* ---- Sheet (editor) ---- */
.sheet {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(20,22,20,.34);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fade .2s ease;
}
.sheet-card {
  background: var(--bg); width: 100%; max-width: 540px;
  border-radius: 22px 22px 0 0; padding: 10px 18px calc(24px + env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
  animation: slideup .26s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideup { from { transform: translateY(100%); } to { transform: none; } }
.sheet-grip { width: 40px; height: 4px; border-radius: 999px; background: var(--line); margin: 4px auto 14px; }
.sheet h2 { margin: 0 0 16px; font-size: 1.2rem; }
.field { margin-bottom: 16px; }
.field > label { display: block; font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 7px; }
.field input[type="text"], .field input[type="number"], .field input[type="time"], .field textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--line); color: var(--text);
  border-radius: 12px; padding: 13px; font-size: 1rem; font-family: inherit;
}
.field textarea { resize: vertical; min-height: 60px; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1px solid var(--line); background: var(--surface); color: var(--text);
  border-radius: 999px; padding: 9px 14px; font-size: .86rem; font-weight: 600; cursor: pointer;
  transition: all .12s ease;
}
.chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.daychip { width: 40px; height: 40px; border-radius: 50%; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-opt {
  border: 1px solid var(--line); background: var(--surface); border-radius: 14px;
  padding: 12px; cursor: pointer; text-align: left; transition: all .12s ease;
}
.type-opt.on { border-color: var(--accent); background: var(--accent-soft); }
.type-opt .t { font-size: .9rem; font-weight: 700; }
.type-opt .d { font-size: .72rem; color: var(--muted); margin-top: 3px; line-height: 1.35; }
.type-opt.on .d { color: var(--accent-ink); }

.stepper { display: inline-flex; align-items: center; gap: 14px; }
.stepper button { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); font-size: 1.3rem; cursor: pointer; color: var(--text); }
.stepper .val { font-size: 1.3rem; font-weight: 800; min-width: 28px; text-align: center; }

.sheet-actions { display: flex; gap: 10px; margin-top: 8px; }
.sheet-actions .btn { flex: 1; }

/* ---- Toast ---- */
.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(92px + env(safe-area-inset-bottom));
  background: var(--accent-ink); color: #fff;
  padding: 11px 18px; border-radius: 999px; font-size: .86rem; font-weight: 600;
  z-index: 60; box-shadow: 0 6px 20px rgba(0,0,0,.18);
  animation: toastin .25s ease;
}
@keyframes toastin { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translateX(-50%); } }

/* ---- Onboarding ---- */
.intro { position: fixed; inset: 0; z-index: 70; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 28px; }
.intro-card { max-width: 380px; text-align: center; }
.intro-mark { width: 78px; height: 78px; border-radius: 22px; background: var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; }
.intro h1 { font-size: 1.6rem; margin: 0 0 10px; }
.intro p { color: var(--muted); line-height: 1.6; font-size: .95rem; margin: 0 0 14px; }
.intro .feats { text-align: left; margin: 18px 0 24px; }
.intro .feat { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
.intro .feat svg { flex: none; color: var(--accent); margin-top: 2px; }
.intro .feat b { display: block; font-size: .92rem; }
.intro .feat span { font-size: .82rem; color: var(--muted); line-height: 1.45; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* read-only calendar events */
.cal-event { background: var(--surface-2); }
.cal-ico { flex: none; width: 28px; height: 28px; border-radius: 9px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 1rem; }

/* celebration + reward prompt */
.celebrate { position: fixed; inset: 0; z-index: 75; background: rgba(20,22,20,.42); display: flex; align-items: center; justify-content: center; padding: 24px; animation: fade .2s ease; }
.celebrate-card { background: var(--bg); width: 100%; max-width: 400px; border-radius: 24px; padding: 30px 24px 24px; text-align: center; animation: pop .3s cubic-bezier(.2,.9,.3,1.2); }
@keyframes pop { from { transform: scale(.92); opacity: 0; } to { transform: none; opacity: 1; } }
.celebrate-emoji { font-size: 3.4rem; line-height: 1; margin-bottom: 10px; animation: bounceIn .5s ease; }
@keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
.celebrate-title { font-size: 1.35rem; margin: 0 0 8px; }
.celebrate-body { font-size: .95rem; color: var(--text); line-height: 1.55; margin: 0 0 16px; }
.reward-callout { display: flex; gap: 11px; align-items: flex-start; text-align: left; background: var(--accent-soft); color: var(--accent-ink); border-radius: 14px; padding: 13px 14px; font-size: .9rem; font-weight: 600; line-height: 1.45; margin-bottom: 14px; }
.reward-ico { font-size: 1.25rem; line-height: 1.2; }
.celebrate-why { font-size: .82rem; color: var(--muted); line-height: 1.55; text-align: left; margin: 0 0 20px; }
.reward-hint { font-size: .78rem; color: var(--muted); line-height: 1.5; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }

/* date pickers + date tags */
.date-row { display: flex; gap: 10px; }
.date-col { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.date-lbl { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

/* ---------------- Date helpers (local, Monday-start) ---------------- */
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function todayKey() { return dateKey(new Date()); }
// Monday = 0 ... Sunday = 6
function dowMon(d) { return (d.getDay() + 6) % 7; }
function mondayOf(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - dowMon(x)); return x; }
function weekKey(d) { return dateKey(mondayOf(d || new Date())); }
function weekDates(ref) { const m = mondayOf(ref || new Date()); return Array.from({ length: 7 }, (_, i) => { const x = new Date(m); x.setDate(m.getDate() + i); return x; }); }
function sameWeek(k, ref) { return weekKey(new Date(k)) === weekKey(ref || new Date()); }

}
function load() {
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) S = Object.assign(defaultState(), JSON.parse(raw)); } catch (e) {}

  if (!S.settings) S.settings = defaultState().settings;
  if (!Array.isArray(S.tasks)) S.tasks = [];

function totalComps(t) { return (t.completions || []).length; }
function doneToday(t) { return compsOn(t, todayKey()) > 0; }

// Is the task expected to appear in Today's list at all?
function scheduledToday(t) {
  if (t.archived) return false;
  if (t.startDate && todayKey() < t.startDate) return false;
  if (t.type === 'daily') return true;
  if (t.type === 'weekdays') return (t.days || []).includes(dowMon(new Date()));
  if (t.type === 'weekly') return true;       // always available to log toward the week
  if (t.type === 'finite') return true;
  return false;
}
// Is this card "done" in the Today context?
function isDoneInToday(t) {
  if (t.type === 'daily' || t.type === 'weekdays') return doneToday(t);
  if (t.type === 'weekly') return compsThisWeek(t) >= t.target;
  if (t.type === 'finite') return totalComps(t) >= t.target;
  return false;
}

/* ---- Selected-day helpers (browse any day this week) ---- */
function activeDayKey() { return viewDayKey || todayKey(); }
function scheduledOnDate(t, d) {
  if (t.archived) return false;
  if (t.startDate && dateKey(d) < t.startDate) return false;
  if (t.type === 'daily') return true;
  if (t.type === 'weekdays') return (t.days || []).includes(dowMon(d));
  // weekly / finite goals are week-level — only surface them on the live "today" view
  if (t.type === 'weekly') return compsThisWeek(t) < t.target;
  if (t.type === 'finite') return totalComps(t) < t.target;
  return false;
}
function dayDone(t, day) {
  if (t.type === 'weekly') return compsThisWeek(t) >= t.target;
  if (t.type === 'finite') return totalComps(t) >= t.target;
  return compsOn(t, day.key) > 0;
}
function logOnDate(t, key) {
  const has = compsOn(t, key) > 0;
  let added = false;
  if (has) t.completions = (t.completions || []).filter(ts => dateKey(new Date(ts)) !== key);
  else { t.completions.push(new Date(key + 'T12:00:00').toISOString()); added = true; celebrate(t); }
  save(); renderCurrent(); renderHeader();
  if (added) runCelebrations(null);
}

  else { const k = dateKey(weekDates()[idx]); viewDayKey = (k === todayKey() ? null : k); }
  renderHeader();
  if (currentView !== 'today') setView('today'); else renderToday();
}

/* ---------------- Actions ---------------- */
function logTask(t) {
  const k = todayKey();
  let added = false, reachedWeekly = null;
  if (t.type === 'daily' || t.type === 'weekdays') {
    if (doneToday(t)) {
      t.completions = (t.completions || []).filter(ts => dateKey(new Date(ts)) !== k);
    } else {
      t.completions.push(new Date().toISOString()); added = true; celebrate(t);
    }
  } else {
    t.completions.push(new Date().toISOString()); added = true;
    lastUndo = { taskId: t.id, ts: t.completions[t.completions.length - 1] };
    if (t.type === 'finite' && totalComps(t) >= t.target) { t.archived = true; toast('Goal complete \u2014 beautifully done.'); }
    else if (t.type === 'weekly' && compsThisWeek(t) === t.target) { reachedWeekly = t; }
    else { toast('Logged \u00b7 tap to undo', () => undoLast()); }
    celebrate(t);
  }
  save(); renderCurrent(); renderHeader();
  if (added) runCelebrations(reachedWeekly);
}
function undoLast() {
  if (!lastUndo) return;
  const t = S.tasks.find(x => x.id === lastUndo.taskId);
  if (t) { t.completions = t.completions.filter(ts => ts !== lastUndo.ts); if (t.archived && totalComps(t) < t.target) t.archived = false; save(); renderCurrent(); renderHeader(); }
  lastUndo = null;
}
function celebrate(t) { if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} } }

function addTask(o) { const t = newTask(o); S.tasks.push(t); save(); return t; }
function deleteTask(id) { S.tasks = S.tasks.filter(t => t.id !== id); save(); }

/* ---------------- Lightweight quick parse for the add field ---------------- */
function parseQuick(text) {
  const res = { title: text.trim(), type: 'daily', days: [], target: 3 };
  let s = ' ' + text.toLowerCase() + ' ';
  const dayMap = { mon: 0, monday: 0, tue: 1, tues: 1, tuesday: 1, wed: 2, weds: 2, wednesday: 2, thu: 3, thur: 3, thurs: 3, thursday: 3, fri: 4, friday: 4, sat: 5, saturday: 5, sun: 6, sunday: 6 };
  let matched = false;
  // "N times a week" / "Nx a week" / "N a week"
  let m = s.match(/(\d+)\s*(?:x|times)?\s*(?:a|per|\/)\s*week/);
  if (m) { res.type = 'weekly'; res.target = Math.max(1, parseInt(m[1], 10)); matched = true; res.title = clean(text, m[0]); }
  // "N times total" / "N times then done"
  if (!matched) { m = s.match(/(\d+)\s*times(?:\s*(?:total|in all|then\s*done))/); if (m) { res.type = 'finite'; res.target = Math.max(1, parseInt(m[1], 10)); matched = true; res.title = clean(text, m[0]); } }
  if (!matched && /\bweekdays\b/.test(s)) { res.type = 'weekdays'; res.days = [0, 1, 2, 3, 4]; matched = true; res.title = clean(text, 'weekdays'); }
  if (!matched && /\bweekends?\b/.test(s)) { res.type = 'weekdays'; res.days = [5, 6]; matched = true; res.title = clean(text, 'weekend'); }
  if (!matched && (/\bevery\s*day\b/.test(s) || /\bdaily\b/.test(s))) { res.type = 'daily'; matched = true; res.title = clean(text, /every\s*day|daily/i); }
  if (!matched) {
    const found = [];
    Object.keys(dayMap).forEach(k => { if (new RegExp('\\b' + k + '\\b').test(s)) found.push(dayMap[k]); });
    if (found.length) { res.type = 'weekdays'; res.days = [...new Set(found)].sort((a, b) => a - b); matched = true; }
  }
  if (!res.title) res.title = text.trim();
  return res;
}
function clean(text, frag) {
  let out = text;
  if (frag instanceof RegExp) out = out.replace(frag, ' ');
  else { const i = out.toLowerCase().indexOf(frag.trim().toLowerCase()); if (i >= 0) out = out.slice(0, i) + out.slice(i + frag.trim().length); }
  return out.replace(/\s{2,}/g, ' ').trim().replace(/[,;:]+$/, '').trim();
}

function niceDate(key) { const d = new Date(key + 'T12:00:00'); const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return mo[d.getMonth()] + ' ' + d.getDate(); }

function taskCard(t, day) {
  day = day || { key: todayKey(), isToday: true, isFuture: false, isPast: false };
  const isGoal = (t.type === 'weekly' || t.type === 'finite');
  const done = isGoal ? isDoneInToday(t) : compsOn(t, day.key) > 0;
  const card = el('div', 'card');
  if (done) card.classList.add('done');
  if (day.isFuture && !isGoal) card.classList.add('future');

  const chk = el('button', 'check');
  if (isGoal) {
    const c = t.type === 'weekly' ? compsThisWeek(t) : totalComps(t);
    if (done) { chk.classList.add('on'); chk.innerHTML = CHK; }
    else { chk.classList.add('count'); chk.textContent = c; }
  } else {
    if (done) chk.classList.add('on');
    chk.innerHTML = CHK;
  }
  chk.setAttribute('aria-label', done ? 'Mark not done' : 'Log ' + t.title);
  chk.addEventListener('click', (e) => {

/* ---------------- Stats ---------------- */
function weeklyRate() {
  // returns {done, expected, pct}
  let done = 0, expected = 0;
  const today = new Date(); const daysElapsed = dowMon(today) + 1; // Mon..today inclusive
  const wd = weekDates();
  S.tasks.forEach(t => {
    if (t.startDate && t.startDate > dateKey(wd[daysElapsed - 1])) return;
    if (t.type === 'daily') {
      for (let i = 0; i < daysElapsed; i++) { if (t.startDate && dateKey(wd[i]) < t.startDate) continue; expected++; if (compsOn(t, dateKey(wd[i])) > 0) done++; }
    } else if (t.type === 'weekdays') {
      for (let i = 0; i < daysElapsed; i++) { if ((t.days || []).includes(i)) { if (t.startDate && dateKey(wd[i]) < t.startDate) continue; expected++; if (compsOn(t, dateKey(wd[i])) > 0) done++; } }
    } else if (t.type === 'weekly') {
      expected += t.target; done += Math.min(t.target, compsThisWeek(t));
    }
    // finite excluded from weekly rate
  });
  const pct = expected ? Math.round((done / expected) * 100) : 0;
  return { done, expected, pct };
}
function perDayCounts() {
  const wd = weekDates();
  return wd.map(d => {
    const k = dateKey(d);
    let c = 0; S.tasks.forEach(t => c += compsOn(t, k));
    return c;
  });
}
function currentStreak() {
  let streak = 0; const d = new Date(); d.setHours(0, 0, 0, 0);
  for (let i = 0; i < 400; i++) {
    const k = dateKey(d);
    const any = S.tasks.some(t => compsOn(t, k) > 0);
    if (any) streak++;
    else if (i === 0) { /* today not done yet — keep checking yesterday */ }
    else break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

    + '</svg>';
}

/* ---------------- Notifications ---------------- */
async function onNotifyToggle(e) {
  if (e.target.checked) {
    if (!('Notification' in window)) { toast('This device cannot show notifications.'); e.target.checked = false; return; }
    let perm = Notification.permission;
    if (perm !== 'granted') { try { perm = await Notification.requestPermission(); } catch (_) {} }
    if (perm === 'granted') { S.settings.notify = true; save(); scheduleReminders(); toast('Reminders on. I will nudge you daily.'); }
    else { e.target.checked = false; toast('Notifications are blocked. Allow them for Tally in your settings.'); }
  } else { S.settings.notify = false; save(); scheduleReminders(); }
}
function scheduleReminders() {
  if (reminderTimer) { clearInterval(reminderTimer); reminderTimer = null; }
  if (!S.settings.notify) return;
  reminderTimer = setInterval(checkReminder, 30000);
  checkReminder();
}
function checkReminder() {
  if (!S.settings.notify || !('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date(); const hm = pad(now.getHours()) + ':' + pad(now.getMinutes());
  const tk = todayKey();
  if (hm === (S.settings.reminderTime || '20:00') && S.settings.lastNotifyDay !== tk) {
    const left = S.tasks.filter(t => scheduledToday(t) && !isDoneInToday(t)).length;
    const body = left ? (left === 1 ? 'One task left for today.' : left + ' tasks left for today.') : 'All done today — nice. A quick check-in?';
    fireNotification('Tally', body);
    S.settings.lastNotifyDay = tk; save();
  }
}
function fireNotification(title, body) {
  try {
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'notify', title, body, tag: 'tally-daily' });
    } else if (Notification.permission === 'granted') {
      new Notification(title, { body, icon: 'icons/icon-192.png' });
    }
  } catch (e) {}
}

const DOW_FULL = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
function completionsByWeekday(weeks) {
  const counts = [0, 0, 0, 0, 0, 0, 0];
  const cutoff = mondayOf(new Date()); cutoff.setDate(cutoff.getDate() - (weeks - 1) * 7);
  const ck = dateKey(cutoff);

function computeInsights() {
  const out = [];
  if (allCompletionDays().length < 3) return out;
  const wd = completionsByWeekday(8);
  const mx = Math.max(...wd);
  if (mx > 0) out.push('🗓️ Your strongest day is ' + DOW_FULL[wd.indexOf(mx)] + '.');
  const wts = weeklyTotals(2);
  const last = wts[0].count, now = wts[1].count;
  if (last || now) out.push(now > last ? '📈 You’re ahead of last week (' + now + ' vs ' + last + ').' : now < last ? '🌱 A little behind last week (' + now + ' vs ' + last + ') — easy to close.' : '⚖️ Holding steady with last week (' + now + ').');
  const active = S.tasks.filter(t => !t.archived && (t.type === 'weekly' || t.type === 'daily' || t.type === 'weekdays'));
  let best = null, bestRatio = -1;
  active.forEach(t => {
    const ratio = t.type === 'weekly' ? (t.target ? compsThisWeek(t) / t.target : 0) : daysDoneThisWeek(t) / 7;

  let best = 1, run = 1;
  for (let i = 1; i < days.length; i++) {
    const prev = new Date(days[i - 1] + 'T12:00:00'), cur = new Date(days[i] + 'T12:00:00');
    const diff = Math.round((cur - prev) / 86400000);
    run = diff === 1 ? run + 1 : 1;
    if (run > best) best = run;
  }
  return best;
}
function weeklyTotals(num) {
  const all = allCompletionDays();
  const thisMon = mondayOf(new Date());
  const out = [];
  for (let w = num - 1; w >= 0; w--) {
    const start = new Date(thisMon); start.setDate(thisMon.getDate() - w * 7);
    const end = new Date(start); end.setDate(start.getDate() + 7);
    const sk = dateKey(start), ek = dateKey(end);
    const count = all.filter(d => d >= sk && d < ek).length;
    out.push({ count, label: w === 0 ? 'now' : String(start.getDate()) });
  }
  return out;
}
function renderTrends(v) {
  const total = allCompletionDays().length;
  if (!total) return;
  const wts = weeklyTotals(8);
  const card = el('div', 'stat-card');
  card.innerHTML = '<h3>Over time</h3><p class="hint">Tasks completed each week — last 8 weeks</p>';
  const mx = Math.max(1, ...wts.map(w => w.count));
  const bars = el('div', 'wbars');
  wts.forEach(w => {
    const col = el('div', 'wbar-col');
    col.appendChild(el('div', 'wbar-val', w.count || ''));
    const bar = el('div', 'wbar' + (w.count ? '' : ' empty'));
    bar.style.height = (w.count ? Math.max(8, (w.count / mx) * 96) : 4) + 'px';
    col.appendChild(bar);
    col.appendChild(el('div', 'wbar-lbl', w.label));
    bars.appendChild(col);
  });
  card.appendChild(bars);
  v.appendChild(card);
  const row = el('div', 'bigrow');
  row.appendChild(numCard(total, 'done all-time'));
  row.appendChild(numCard(longestStreak(), 'longest streak'));
  v.appendChild(row);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
